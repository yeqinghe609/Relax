exclude: |
    (?x)^(
        transfer_queue/.*
    )$

repos:
  # Common hooks
  -   repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.4.0
      hooks:
      -   id: check-added-large-files
      -   id: check-merge-conflict
          args: ['--assume-in-merge']
      -   id: check-symlinks
      -   id: detect-private-key
      -   id: end-of-file-fixer
      -   id: debug-statements
      -   id: trailing-whitespace
          types:
            - python
            - yaml
            - json
            - shell
            - c
            - proto
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        # exclude: 'relax/xxx'
        args: [ --fix ]

      - id: ruff-format
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.9
    hooks:
      - id: mdformat
        args: ["--number"]
        additional_dependencies:
          - mdformat-openmmlab
          - mdformat_frontmatter
          - linkify-it-py
        exclude: |
            (?x)^(
                skills/.* | .opencode/.* | docs/.*
            )$
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v14.0.6
    hooks:
      - id: clang-format
  - repo: local
    hooks:
      - id: docformatter
        name: docformatter
        entry: docformatter --in-place --wrap-descriptions 79
        language: python
        types: [python]
        additional_dependencies: ["docformatter==1.3.1"]
      - id: check-conflict-markers
        name: check-conflict-markers
        entry: python .pre-commit-hooks/check_conflict_markers.py
        language: system
        types: [text]
        exclude: |
            (?x)^(
                versioneer\.py
            )$
      - id: format-ascii-boxes
        name: format-ascii-boxes
        entry: python .pre-commit-hooks/format_ascii_boxes.py
        language: system
        files: \.md$

  # Gitleaks - Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        entry: python .pre-commit-hooks/gitleaks_tracked.py
        always_run: true
        pass_filenames: false
