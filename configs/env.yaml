env_vars:
  #设置tokennizers是否支持并行
  TOKENIZERS_PARALLELISM: 'true'
  #设置 NCCL Debug日志级别
  NCCL_DEBUG: 'WARN'
  #设置设备最大连接数
  CUDA_DEVICE_MAX_CONNECTIONS: '1'
  PYTHONBUFFERED: "16"
  PYTHONPATH: /root/Megatron-LM/:/root/Relax
  CLEARML_SUPPRESS_UPDATE_MESSAGE: "1"
  RAY_EXPERIMENTAL_NOSET_ASCEND_RT_VISIBLE_DEVICES: "1"
